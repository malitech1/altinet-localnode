<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altinet Home Builder</title>
    <link rel="stylesheet" href="/static/home_builder.css" />
  </head>
  <body>
    <main class="hb-shell">
      <h1>Altinet Floorplan Editor</h1>
      <p>Simple interactive SVG floorplan editing prototype.</p>
      <a class="back-link" href="/">Back to Dashboard</a>
      <section class="hb-grid">
        <form id="home-form">
          <label>Property Name <input id="property_name" /></label>
          <label>Boundary Width (m) <input id="boundary_width" type="number" step="0.1" /></label>
          <label>Boundary Depth (m) <input id="boundary_depth" type="number" step="0.1" /></label>
          <label>House Width (m) <input id="house_width" type="number" step="0.1" /></label>
          <label>House Depth (m) <input id="house_depth" type="number" step="0.1" /></label>
          <div class="actions"><button type="submit">Save</button><button id="reset-demo" type="button">Reset Demo</button><button id="clear-floor" type="button">Clear Selected Floor</button><button id="delete-floor" type="button">Delete Selected Floor</button></div>
        </form>
        <div>
          <div class="toolbar" id="toolbar"></div>
          <div class="toolbar-row">
            <label>Floor
              <select id="floor-select"></select>
            </label>
            <label>Wall Type
              <select id="wall-type-select"><option value="internal">Internal</option><option value="external">External</option></select>
            </label>
            <button id="add-floor" type="button">+ Add Floor</button>
            <button id="finish-room" type="button">Finish Room</button>
            <button id="delete-selected" type="button">Delete Selected</button>
            <span id="mode-status"></span>
          </div>
          <div id="selection-panel">No object selected.</div>
          <svg id="floorplan" viewBox="0 0 700 450"></svg>
          <pre id="json-preview"></pre>
        </div>
      </section>
    </main>
    <script src="/static/home_builder.js"></script>
  </body>
</html>
