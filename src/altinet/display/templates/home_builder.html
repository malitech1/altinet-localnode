<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altinet Home Builder</title>
    <link rel="stylesheet" href="/static/home_builder.css" />
  </head>
  <body>
    <main class="hb-shell">
      <h1>Altinet Home Builder</h1>
      <p>First editable home model demo.</p>
      <section class="hb-grid">
        <form id="home-form">
          <label>Property Name <input id="property_name" /></label>
          <label>Boundary Width (m) <input id="boundary_width" type="number" step="0.1" /></label>
          <label>Boundary Depth (m) <input id="boundary_depth" type="number" step="0.1" /></label>
          <label>House Width (m) <input id="house_width" type="number" step="0.1" /></label>
          <label>House Depth (m) <input id="house_depth" type="number" step="0.1" /></label>
          <label>Room Name <input id="room_name" /></label>
          <label>Room Width (m) <input id="room_width" type="number" step="0.1" /></label>
          <label>Room Depth (m) <input id="room_depth" type="number" step="0.1" /></label>
          <div class="actions"><button type="submit">Save</button><button id="reset-demo" type="button">Reset Demo</button></div>
        </form>
        <div>
          <svg id="floorplan" viewBox="0 0 700 450"></svg>
          <pre id="json-preview"></pre>
        </div>
      </section>
    </main>
    <script src="/static/home_builder.js"></script>
  </body>
</html>
