<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altinet Home Builder</title>
    <link rel="stylesheet" href="/static/home_builder.css" />
  </head>
  <body>
    <main class="hb-shell">
      <h1>Altinet Floorplan Editor</h1>
      <p>Development-grade blank floorplan editor.</p>
      <a class="back-link" href="/">Back to Dashboard</a>
      <section class="hb-grid">
        <form id="home-form">
          <label>Property Name <input id="property_name" /></label>
          <label>Boundary Width (m) <input id="boundary_width" type="number" step="0.1" /></label>
          <label>Boundary Depth (m) <input id="boundary_depth" type="number" step="0.1" /></label>
          <label>House Width (m) <input id="house_width" type="number" step="0.1" /></label>
          <label>House Depth (m) <input id="house_depth" type="number" step="0.1" /></label>
          <div class="actions"><button type="submit">Save</button><button id="load-demo" type="button">Load Demo</button><button id="new-blank" type="button">New Blank Home</button><button id="clear-floor" type="button">Clear Selected Floor</button><button id="delete-floor" type="button">Delete Selected Floor</button></div>
        </form>
        <div>
          <div class="toolbar" id="toolbar"></div>
          <div class="toolbar-row">
            <label>Floor
              <select id="floor-select"></select>
            </label>
            <label>Wall Type
              <select id="wall-type-select"><option value="internal">Internal</option><option value="external">External</option></select>
            </label>
            <button id="add-floor" type="button">+ Add Floor</button>
            <button id="finish-room" type="button">Finish Room</button>
            <button id="clear-room" type="button">Cancel Room</button>
            <label>Furniture
              <select id="furniture-type-select"><option value="bed">bed</option><option value="sofa">sofa</option><option value="dining_table">dining table</option><option value="kitchen_counter">kitchen counter</option><option value="bath">bath</option><option value="toilet">toilet</option><option value="sink">sink</option><option value="stove">stove</option><option value="closet">closet</option></select>
            </label>
            <button id="edit-style" type="button">Edit Style</button><button id="architectural-style" type="button">Architectural Style</button>
            <label><input id="toggle-grid" type="checkbox" checked /> Grid</label>
            <label><input id="toggle-dimensions" type="checkbox" checked /> Dimensions</label>
            <button id="delete-selected" type="button">Delete Selected</button>
            <div class="zoom-controls"><button id="zoom-out" type="button">Zoom Out</button><button id="zoom-in" type="button">Zoom In</button><button id="zoom-reset" type="button">Reset Zoom</button><span id="zoom-display">100%</span></div><span id="mode-status"></span>
          </div>
          <div id="selection-panel">No object selected.</div>
          <svg id="floorplan" viewBox="0 0 700 450"></svg>
          <pre id="json-preview"></pre>
        </div>
      </section>
    </main>
    <script src="/static/home_builder.js"></script>
  </body>
</html>
